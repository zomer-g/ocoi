services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ocoi
      POSTGRES_USER: ${POSTGRES_USER:-ocoi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
