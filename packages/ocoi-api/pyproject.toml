[project]
name = "ocoi-api"
version = "0.1.0"
description = "FastAPI server for search, entities, graph queries, and external integration"
requires-python = ">=3.12"
dependencies = [
    "ocoi-common",
    "ocoi-db",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "python-multipart>=0.0.9",
    "aiofiles>=24.1",
    "pyjwt>=2.9",
    "httpx>=0.27",
    "openai>=1.0",
    "pdfplumber>=0.11",
    "pymupdf>=1.24",
    "psutil>=5.9",
]

[project.scripts]
ocoi-api = "ocoi_api.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ocoi_api"]

[tool.uv.sources]
ocoi-common = { workspace = true }
ocoi-db = { workspace = true }
