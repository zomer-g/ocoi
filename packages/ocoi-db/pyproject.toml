[project]
name = "ocoi-db"
version = "0.1.0"
description = "Database models, migrations, graph queries, and search"
requires-python = ">=3.12"
dependencies = [
    "ocoi-common",
    "sqlalchemy[asyncio]>=2.0",
    "aiosqlite>=0.20",
    "alembic>=1.14",
    "greenlet>=3.0",
    "asyncpg>=0.30",
    "psycopg2-binary>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ocoi_db"]

[tool.uv.sources]
ocoi-common = { workspace = true }
