[project]
name = "ocoi-extractor"
version = "0.1.0"
description = "Hebrew entity extraction using DictaBERT NER and DeepSeek LLM"
requires-python = ">=3.12"
dependencies = [
    "ocoi-common",
    "ocoi-db",
    "transformers>=4.40",
    "torch>=2.0",
    "openai>=1.0",
    "rapidfuzz>=3.0",
    "click>=8.0",
    "tqdm>=4.66",
]

[project.scripts]
ocoi-extract = "ocoi_extractor.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ocoi_extractor"]

[tool.uv.sources]
ocoi-common = { workspace = true }
ocoi-db = { workspace = true }
