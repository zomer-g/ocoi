[project]
name = "ocoi-matcher"
version = "0.1.0"
description = "Corporation name to registration number matching"
requires-python = ">=3.12"
dependencies = [
    "ocoi-common",
    "ocoi-db",
    "httpx>=0.27",
    "rapidfuzz>=3.0",
    "click>=8.0",
]

[project.scripts]
ocoi-match = "ocoi_matcher.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ocoi_matcher"]

[tool.uv.sources]
ocoi-common = { workspace = true }
ocoi-db = { workspace = true }
