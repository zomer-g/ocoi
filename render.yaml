services:
  - type: web
    name: ocoi
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ocoi-db
          property: connectionString
      - key: ENV
        value: production
      - key: STATIC_DIR
        value: /app/static
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENCORPORATES_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: ocoi-db
    plan: free
    databaseName: ocoi
    postgresMajorVersion: "16"
