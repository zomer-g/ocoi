services:
  - type: web
    name: ocoi
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ocoi-db
          property: connectionString
      - key: ENV
        value: production
      - key: STATIC_DIR
        value: /app/static
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENCORPORATES_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: TZ
        value: Asia/Jerusalem

databases:
  - name: ocoi-db
    plan: free
    databaseName: ocoi
    postgresMajorVersion: "16"
